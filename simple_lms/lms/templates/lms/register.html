<!DOCTYPE html>
<html>
<head>
<title>Register - Sagara Course</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(to bottom, #e3f2fd, #f8fbff);
    margin: 0;
}

/* HEADER */
.header {
    background: #fff;
    padding: 18px 40px;
    box-shadow: 0 2px 10px rgba(0,123,255,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    color: #1565c0;
}

.nav {
    display: flex;
    gap: 20px;
}

.nav a {
    text-decoration: none;
    color: #1976d2;
    font-weight: 500;
}

/* AUTH CONTAINER */
.auth-container {
    width: 360px;
    margin: 60px auto;
    background: #fff;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(0,123,255,0.1);
}

h2 {
    text-align: center;
    color: #1565c0;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #cfe3ff;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    background: #42a5f5;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #1e88e5;
}

.error {
    color: #e53935;
    text-align: center;
}

.switch {
    text-align: center;
    margin-top: 15px;
}

.switch a {
    color: #1976d2;
    text-decoration: none;
    font-weight: 500;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">🌊 Sagara Course</div>

    <div class="nav">
        <a href="/">Dashboard</a>
        <a href="/login/">Login</a>
    </div>
</div>

<div class="auth-container">

<h2>📝 Register</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>
<input type="password" name="password2" placeholder="Konfirmasi Password" required>

<button type="submit">Daftar</button>
</form>

<p class="switch">Sudah punya akun? <a href="/login/">Login di sini</a></p>

</div>

</body>
</html>
