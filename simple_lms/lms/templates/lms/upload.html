<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS - Upload CSV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #e3f2fd, #f8fbff);
            margin: 0;
        }

        /* HEADER */
        .header {
            background: #ffffff;
            padding: 18px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            color: #1976d2;
        }

         .nav a {
            margin-left: 15px;
            text-decoration: none;
            color: #555;
            font-size: 14px;
        }

        .nav a:hover {
            color: #1565c0;
        }

        /* CONTAINER */
        .container {
            max-width: 420px;
            margin: 60px auto;
        }

        .card {
            background: #ffffff;
            padding: 35px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 10px;
            color: #1976d2;
        }

        .subtitle {
            font-size: 13px;
            color: #777;
            margin-bottom: 25px;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #f9fbfd;
            cursor: pointer;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #42a5f5;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e88e5;
        }

        .message {
            margin-top: 15px;
            color: #2e7d32;
            font-size: 14px;
        }

        .error {
            color: #c62828;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        .footer span {
            color: #1976d2;
            font-weight: 500;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="title">🌊 Sagara Course</div>

    <div class="nav">
        <a href="/">Dashboard</a>
    </div>
</div>

<!-- CONTENT -->
<div class="container">
    <div class="card">

        <h2>📁 Upload CSV</h2>
        <div class="subtitle">Import data course dengan cepat</div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="file" required>
            <button type="submit">Upload CSV</button>
        </form>

        {% if message %}
            <div class="message">{{ message }}</div>
        {% endif %}

        {% if error %}
            <div class="message error">{{ error }}</div>
        {% endif %}

        <div class="footer">
            Format: <span>name, description, price</span>
        </div>

    </div>
</div>

</body>
</html>
