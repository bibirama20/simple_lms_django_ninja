version: "3.5"
services:
  mongo:
    container_name: mongo
    image: mongo:5.0.3
    ports:
      - 27017:27017
    command: mongod

  web:
    build: .
    container_name: latmongo_web
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=latihan
    depends_on:
      - mongo
